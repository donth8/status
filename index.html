<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>.truespace Status</title>
  <script>
    (function () {
      var key = 'truespace-status-theme';
      var theme = 'dark';
      try {
        var stored = localStorage.getItem(key);
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
      } catch (error) {}
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="https://truespace.app">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" x2="20" y1="19" y2="19"></line>
      </svg>
      <span>.truespace</span>
    </a>
    <nav class="nav-links" aria-label="Main">
      <a class="active" href="./">status</a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle-btn" type="button" aria-label="Switch to light mode" aria-pressed="true">☀</button>
      <button id="refresh-btn" type="button" aria-label="Refresh status">↻</button>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">Status</h1>
    <p class="page-lead">Bill and Steve servers and services. Live checks from each server <code>/status</code> endpoint.</p>
    <p id="last-updated" class="page-meta">Loading…</p>

    <div id="summary" class="summary" aria-live="polite">
      <span class="badge badge-secondary">checking…</span>
    </div>

    <div id="source-meta" class="pair-grid" aria-label="Status endpoint sources"></div>

    <section id="server-metrics" class="metrics-section" aria-live="polite"></section>

    <section aria-labelledby="services-heading">
      <h2 id="services-heading" class="section-title">Services</h2>
      <p class="section-lead">Health checks grouped by platform area.</p>
      <div id="groups" class="card-grid" aria-live="polite"></div>
    </section>

    <footer class="meta">
      <p>Auto-refreshes every 5 minutes.</p>
      <nav class="meta-links" aria-label="Related links">
        <a href="https://truespace-tunnel.fly.dev:8080/status?format=json">Bill JSON</a>
        <a href="https://truespace-tunnel.fly.dev:8090/status?format=json">Steve JSON</a>
        <a href="https://github.com/donth8/status">Status repo</a>
        <a href="https://github.com/donth8/true-space-infrastructure">Infrastructure repo</a>
      </nav>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
