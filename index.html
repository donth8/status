<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>.truespace Status</title>
  <script>
    (function () {
      var key = 'truespace-status-theme';
      var theme = 'dark';
      try {
        var stored = localStorage.getItem(key);
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
      } catch (error) {}
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <h1>.truespace Status</h1>
        <p class="subtitle">Bill &amp; Steve servers and services</p>
      </div>
      <div class="meta">
        <p id="last-updated">Loading…</p>
        <div class="meta-actions">
          <button id="theme-toggle-btn" type="button" aria-label="Switch to light mode" aria-pressed="true">
            <span class="btn-icon" id="theme-toggle-icon" aria-hidden="true"></span>
            <span class="btn-label" id="theme-toggle-label">Light</span>
          </button>
          <button id="refresh-btn" type="button">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9"/>
                <path d="M14 4v3.5H10.5"/>
              </svg>
            </span>
            <span class="btn-label">Refresh</span>
          </button>
        </div>
      </div>
    </header>

    <section id="overall-banner" class="banner banner-loading" aria-live="polite">
      <p class="banner-title">Checking status…</p>
      <p class="banner-detail" id="summary-text"></p>
    </section>

    <section id="server-metrics" class="server-metrics" aria-live="polite"></section>

    <main id="groups" class="groups" aria-live="polite"></main>

    <div id="source-meta" class="source-meta" aria-label="Status endpoint sources"></div>

    <footer class="footer">
      <p>Live checks from Bill and Steve <code>/status</code> endpoints.</p>
      <nav class="footer-links" aria-label="Related links">
        <a href="https://truespace-tunnel.fly.dev:8080/status">Bill status JSON</a>
        <a href="https://truespace-tunnel.fly.dev:8090/status">Steve status JSON</a>
        <a href="https://github.com/donth8/status">Status repo</a>
        <a href="https://github.com/donth8/true-space-infrastructure">Infrastructure repo</a>
      </nav>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
